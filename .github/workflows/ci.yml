name: Dashboard CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}
  NEXT_PUBLIC_AGENT_API_URL: ${{ secrets.NEXT_PUBLIC_AGENT_API_URL || 'https://placeholder.vercel.app' }}

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test

  e2e-tests:
    name: E2E Tests (real Supabase)
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase with pinned schema
        run: |
          mkdir -p /tmp/sb
          cd /tmp/sb
          supabase init --force
          mkdir -p supabase/migrations
          cp "$GITHUB_WORKSPACE/e2e/fixtures/schema.sql" \
             supabase/migrations/00000000000000_base_schema.sql
          supabase start

      - name: Export Supabase URL + keys
        run: |
          cd /tmp/sb
          supabase status -o env > /tmp/sb.env
          # shellcheck disable=SC1091
          . /tmp/sb.env
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV

      - name: Build (with Supabase env baked in)
        run: npm run build

      - name: Run Playwright
        run: npx playwright test

      - name: Dump Supabase logs on failure
        if: failure()
        run: |
          cd /tmp/sb
          supabase logs --tail 200 db || true
          supabase logs --tail 200 auth || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
